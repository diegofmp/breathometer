# Bird Breathing Analysis - Configuration

# Detection
detection:
  mode: 'rfdetr'  # Options: 'manual' (prompt manual ROI) or 'rfdetr' (automatic detection)

# Segmentation
segmentation:
  target_class: 'bird'
  model: "/media/diego/AE8D-4E3F/breathometer/runs/train_rfdetr/rfdetr_experiment_2/checkpoint_best_regular.pth"
  model_path: "/media/diego/AE8D-4E3F/breathometer/runs/train_rfdetr/rfdetr_experiment_2/checkpoint_best_regular.pth"

# Chest Localization
localization:
  custom_localizer:
    buffer_frames: 30  # Total frames buffered by pipeline for processing
    hand_mask_buffer_frames: 15  # Frames used for hand/bird mask detection

# Tracking
tracking:
  redetect_interval: 0    # Frames between re-detection (0 = disabled)
  start_frame: 300        # Frame to start processing (skip initial stabilization)
  max_frames: 900        # Maximum frames to process (null = all)

# Measurement
# All parameters use defaults - see docs/CONFIG_REFERENCE.md to override

# Signal Processing
signal_processing:
  fps: 30  # Will be auto-detected from video

  # Preprocessing pipeline (applied to raw signal before bandpass filter)
  # Order is fixed: savgol -> detrend -> nonlinear_amplification -> normalize
  preprocessing:
    # 1. Savitzky-Golay smoothing — preserves breath peaks while removing sensor noise
    savgol:
      enabled: true
      window_size: 5  # Must be odd number; small values (7-11) keep spikes sharp
      polyorder: 2     # Polynomial order (lower = more smoothing)

    # 2. Detrend — removes slow baseline drift caused by handling / wiggling
    detrend:
      enabled: true
      method: 'linear'  # Options: linear, constant

    # 3. Nonlinear amplification — squares (or TKEO-amplifies) the signal so that
    #    breath spikes become much taller than leftover noise
    nonlinear_amplification:
      enabled: false
      method: 'tkeo'  # Options: tkeo (Teager-Kaiser, recommended), square (x^2)

    # 4. Normalization — rescales after the nonlinearity changed the distribution
    normalize:
      enabled: true
      method: 'zscore'  # Options: zscore, minmax, robust

    outlier_clip:
      std_threshold: 3

# Bandpass Filter 
  # Bandpass filter (main frequency filtering)
  bandpass_filter:
    low_freq: 1.0   # Hz (90 BPM) - 5 BPM margin below minimum
    high_freq: 9.0  # Hz (312 BPM) - 11 BPM margin above maximum
    order: 2

  # Real-time breath counting parameters
  breath_counting:
    method: 'autocorrelation_windowed'  # Options: 'emv_phase', 'fft_frequency', 'fft_windowed', 'autocorrelation', "autocorrelation_windowed"

    # EMV phase-based method parameters (only used when method='emv_phase')
    emv_phase:
      min_phase_duration: 0.05  # Minimum duration for inspiration/expiration phases (seconds). Increase to reduce overcounting.
      zero_crossing_threshold: 0.02  # Minimum signal magnitude for valid zero crossing (0.0-1.0). Increase to filter noise crossings.
      min_cycle_amplitude: 0.10  # Minimum cycle amplitude as fraction of signal range (0.0-1.0). Increase to reject shallow cycles.
      ie_ratio_range: [0.3, 5.0]  # Valid I:E ratio range [min, max]. Tighten range to reject abnormal cycles.

    # FFT-based frequency estimation (only used when method='fft_frequency' or 'fft_windowed')
    # Based on proven 2018 approach - immune to amplitude variation
    fft_frequency:
      window_size: 15.0  # Window duration in seconds (for windowed FFT version). Longer = better freq resolution
      overlap: 0.5  # Window overlap fraction (0.0-0.9) for windowed version
      min_snr: 3.0  # Minimum signal-to-noise ratio to trust estimate (3-5 recommended)
      wiener_scaling: true  # Apply sqrt(f) Wiener noise compensation

    # Autocorrelation method parameters (only used when method='autocorrelation' or 'autocorrelation_windowed')
    # Detects periodicity without amplitude assumptions or hard peak spacing constraints
    autocorrelation:
      min_breathing_rate_bpm: 90   # Minimum BPM (1.5 Hz, matches bandpass low_freq)
      max_breathing_rate_bpm: 312  # Maximum BPM (5.2 Hz, matches bandpass high_freq)
      acf_min_prominence: 0.15     # Minimum ACF peak prominence (0-1 scale). Higher = stricter, lower = more sensitive
      acf_peak_selection: 'first'  # Peak selection: 'first' (fundamental frequency) or 'highest' (max prominence)
      min_confidence: 0.3          # Minimum confidence to trust estimate
      low_correlation_threshold: 0.3  # ACF peak value below this triggers low-confidence warning
      window_size: 15.0            # Window duration in seconds (for autocorrelation_windowed). Longer = better for periodicity detection
      overlap: 0.5                 # Window overlap fraction (0.0-0.9) for windowed version
name: breathometer

channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # core scientific
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - scikit-image

  # visualization
  - matplotlib
  - seaborn

  # utilities
  - tqdm
  - pyyaml
  - requests

  - pip:
      # computer vision
      - opencv-python-headless
      - opencv-contrib-python

      # deep learning
      - torch==2.5.1
      - torchvision==0.20.1
      - torchaudio==2.5.1
      - transformers
      - accelerate
      - peft
      - safetensors

      # CV tools
      - supervision
      - rfdetr
      - pycocotools
      - roboflow

      # data
      - polars
      - pyarrow

      # apps
      - streamlit==1.40.2
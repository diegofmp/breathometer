name: bird_breathing_mvp
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.10
  
  # Core scientific computing
  - numpy>=1.24.0
  - scipy>=1.10.0
  - matplotlib>=3.7.0
  - pandas>=2.0.0
  - seaborn>=0.12.0
  
  # Computer vision
  - opencv>=4.8.0
  - scikit-image>=0.21.0
  - pillow>=10.0.0
  
  # Deep learning (CPU by default, remove cpuonly for GPU)
  - pytorch>=2.0.0
  - torchvision>=0.15.0
  - cpuonly  # Remove this line if you have GPU
  
  # Jupyter
  - jupyter>=1.0.0
  - ipykernel>=6.25.0
  - ipywidgets>=8.1.0
  - notebook>=7.0.0
  
  # Utilities
  - tqdm>=4.66.0
  - pyyaml>=6.0
  
  # Pip packages
  - pip>=23.0
  - pip:
    - ultralytics>=8.0.0  # YOLO v8
    - opencv-contrib-python>=4.8.0
